<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
  *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
    body {
      background-color: #5555;
      width: 100%;
      height: 100vh;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #loginForm {
      border-radius: 10px;
      background-color: #ffffff;
      padding: 25px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      justify-content: center;
      align-items: center;
     
    }
    .inputArea {
      display: flex;
      flex-direction: column;
    }
    .inputArea span{
        color: #ff0000;
    }
    .inputArea label {
      font-size: 16px;
      letter-spacing: 0.5;
      margin-bottom: 5px;
      font-family: Arial, Helvetica, sans-serif;
    }
    .input {
      width: 400px;
      border-radius: 8px;
      padding: 6px;
      display: flex;
      gap: 10px;
      flex-direction: row;
      background-color: #fff;
      border: 1px solid black;
    }
    .input input {
      border: none;
      outline: none;
      width: 100%;
    }
    .logo{
        padding-bottom: 20px;
    }
    .input input::placeholder {
        color: #707070;
    }
    .contact-number{
        display: flex;
        gap: 5px;
        width: 400px;
    }
    .contact-number  select{
        border-radius: 8px;
        padding: 6px;
    }
    select option{
        border-radius: 8px;
    }
    .input-contact{
        width: 100%;
        padding: 6px;
        display: flex;
        border-radius: 8px;
        gap: 10px;
      flex-direction: row;
      background-color: #fff;
      border: 1px solid black;
     
    }
      .input-contact input{
        width: 100%;
        border: none;
        outline: none;
      }
    #button {
      width: 400px;
      padding: 15px 20px;
      background-color: #050c9c;
      color: #fff;
      font-size: 14px;
      border-radius: 8px;
      margin-top: 20px;
      border: 2px solid #050c9c;
    }
    #button:hover {
      cursor: pointer;
    }

    .bottomText a{
      text-decoration: none;
      color: #000;
    }

    .bottomText a:hover{
      color: #050c9c;
    }
    
  </style>

  <body>
    <div class="container">
      <div id="loginForm">
       <div class="logo"> <img src="logo (1).png" alt="" /></div>

        <div class="inputArea">
          <label for="">First Name<span>*</span></label>
          <div class="input">
            <img src="user-icon.jpg" alt="" height="30px" width="30px" />
            <input  type="text" id="firstName" placeholder="First Name" oninput="hideError()"/>
          </div>
          <p id="text"></p>
        </div>

         <div class="inputArea">
          <label for="">Last Name</label>
          <div class="input">
            <img src="user-icon.jpg" alt="" height="30px" width="30px" />
            <input  type="text" id="lastName" placeholder="Last Name"/>
          </div>
        </div>

        <div class="inputArea">
          <label for="">Phone Number<span>*</span></label>
          <div class = "contact-number" >
             <select id="countryCode" >
                <option value="+91">INDIA(+91)</option>
                <option value="+971">UAE(+971)</option>
                <option value="+1">USA(+1)</option>
                <option value="+44">UK(+44)</option>
             </select>
             
          <div class="input-contact">
            <img src="contact.png" alt="" height="30px" width="30px" />
            <input  type="text" id="number" oninput="handlePhoneTyping(this)"
             onblur="validatePhone()" placeholder="Phone Number" maxlength="10"/>
          </div>
           </div>
          <p id="error"></p>
        </div>

        <div class="inputArea">
          <label for="">Email<span>*</span></label>
          <div class="input">
            <img src="email.png" alt="" height="30px" width="30px" />
            <input  type="text" id="username" placeholder="Email"  oninput="validateEmail()"/>
          </div>
          <p id="email"></p>
        </div>

        <!-- <div class="inputArea">
          <label for="">Address<span>*</span></label>
          <div class="input">
            <img src="address.png" alt="" height="30px" width="30px" />
            <input  type="text" id="address" placeholder="Enter address"  />
          </div>
          <p id="errorText"></p>
        </div> -->


        <div class="inputArea">
          <label for="">Password<span>*</span></label>
          <div class="input">
            <img src="password.jpg" alt="" height="30px" width="30px"/>

            <input
              type="password"
              id="password"
              placeholder="Enter Password"   oninput="validatePassword()"/> 

              <img src="eye-icon.jpg" alt="togglePassword"  width="30px" height="30px" onclick="toggleIcon()"  id="myImage" >
          </div>

          <p id="para"></p>
        </div>

         <div class="inputArea">
          <label for="">Confirm Password<span>*</span></label>
          <div class="input">
            <img src="password.jpg" alt="" height="30px" width="30px" />

            <input type="password" id="confirmPassword" placeholder="confirm password" oninput="checkConfirmPassword()">

            <img src="eye-icon.jpg" alt="togglePassword"  width="30px" height="30px" onclick="togglePassword()"  id="eyeIcon" >
            
          </div>
          
          <p id="pass"></p>
        </div>

       <button id="button" onclick="signUp()">SIGN UP</button>

       <div class="bottomText">
       <p>Already have an account?<a href="/login.html">  Sign In</a></p>
       </div>
      </div>
    </div>
  </body>


<script src="script.js"></script>

</html>
